<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muevo Drive — Portal Warehouse</title>
<style>
  /* ── Reset & base ──────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0D0D0D;
    --surface:   #151515;
    --card:      #1C1C1C;
    --card2:     #222222;
    --orange:    #F47B20;
    --orange-dim: rgba(244,123,32,0.10);
    --orange-bdr: rgba(244,123,32,0.25);
    --white:     #F8FAFB;
    --muted:     #8A8A8A;
    --border:    rgba(255,255,255,0.07);
    --green:     #27AE60;
    --green-dim: rgba(39,174,96,0.10);
    --green-bdr: rgba(39,174,96,0.25);
    --red:       #E74C3C;
    --red-dim:   rgba(231,76,60,0.10);
    --blue:      #2E86DE;
    --blue-dim:  rgba(46,134,222,0.10);
    --blue-bdr:  rgba(46,134,222,0.25);
    --yellow:    #F1C40F;
    --yellow-dim:rgba(241,196,15,0.10);
    --radius:    10px;
    --radius-lg: 14px;
    --font:      -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Sidebar ──────────────────────────────────────────────────────────── */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
  }

  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text { font-size: 15px; font-weight: 600; color: var(--white); letter-spacing: -.3px; }
  .logo-sub  { font-size: 10px; color: var(--orange); font-weight: 500; letter-spacing: .5px; }

  .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }

  .nav-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    color: var(--muted); text-transform: uppercase;
    padding: 10px 8px 4px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--muted); transition: all .15s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--card); color: var(--white); }
  .nav-item.active { background: var(--orange-dim); color: var(--orange); }
  .nav-item .nav-icon { width: 16px; text-align: center; font-size: 14px; }
  .nav-badge {
    margin-left: auto;
    background: var(--orange); color: #111;
    font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 10px;
  }

  .sidebar-bottom {
    padding: 12px 10px;
    border-top: 1px solid var(--border);
  }

  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    cursor: pointer;
  }
  .user-card:hover { background: var(--card); }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--orange);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #111; flex-shrink: 0;
  }
  .user-name  { font-size: 12px; font-weight: 500; color: var(--white); }
  .user-role  { font-size: 10px; color: var(--muted); }

  /* ── Main ─────────────────────────────────────────────────────────────── */
  .main {
    margin-left: 220px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Topbar ───────────────────────────────────────────────────────────── */
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    position: sticky; top: 0; z-index: 50;
  }

  .topbar-title { font-size: 15px; font-weight: 600; color: var(--white); }
  .topbar-sub   { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; transition: all .15s;
  }
  .btn-primary { background: var(--orange); color: #111; }
  .btn-primary:hover { background: #f08c3a; }
  .btn-ghost {
    background: var(--card); color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.15); }

  /* ── Content ──────────────────────────────────────────────────────────── */
  .content { padding: 28px; flex: 1; }

  /* ── KPI row ──────────────────────────────────────────────────────────── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
  }
  .kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: .3px; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 600; letter-spacing: -1px; color: var(--white); }
  .kpi-value.orange { color: var(--orange); }
  .kpi-value.green  { color: var(--green);  }
  .kpi-sub {
    font-size: 11px; color: var(--muted); margin-top: 6px;
    display: flex; align-items: center; gap: 4px;
  }
  .kpi-sub.up   { color: var(--green); }
  .kpi-sub.down { color: var(--red);   }

  /* ── Section header ───────────────────────────────────────────────────── */
  .section-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title { font-size: 13px; font-weight: 600; color: var(--white); }
  .section-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── Table ────────────────────────────────────────────────────────────── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .table-filters {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
  }

  .search-box {
    flex: 1; display: flex; align-items: center; gap: 8px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px;
  }
  .search-box input {
    background: none; border: none; outline: none;
    color: var(--white); font-size: 12px; font-family: var(--font);
    flex: 1;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 13px; }

  .filter-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 8px;
    background: var(--card2); border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover { color: var(--white); }
  .filter-btn.active { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 10px 18px;
    text-align: left; font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--card2); }
  tbody td { padding: 13px 18px; font-size: 13px; color: var(--white); vertical-align: middle; }

  /* ── Badges ───────────────────────────────────────────────────────────── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 500; white-space: nowrap;
  }
  .badge-green  { background: var(--green-dim);  color: var(--green);  border: 1px solid var(--green-bdr); }
  .badge-orange { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-bdr); }
  .badge-blue   { background: var(--blue-dim);   color: var(--blue);   border: 1px solid var(--blue-bdr); }
  .badge-red    { background: var(--red-dim);     color: var(--red);    border: 1px solid rgba(231,76,60,.25); }
  .badge-muted  { background: var(--card2);       color: var(--muted);  border: 1px solid var(--border); }
  .badge-yellow { background: var(--yellow-dim);  color: var(--yellow); border: 1px solid rgba(241,196,15,.25); }

  /* ── Upload zone ──────────────────────────────────────────────────────── */
  .upload-zone {
    border: 2px dashed var(--orange-bdr);
    border-radius: var(--radius-lg);
    padding: 36px 24px;
    text-align: center;
    background: var(--orange-dim);
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 16px;
  }
  .upload-zone:hover { border-color: var(--orange); background: rgba(244,123,32,0.15); }
  .upload-icon { font-size: 32px; margin-bottom: 10px; }
  .upload-title { font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
  .upload-sub   { font-size: 12px; color: var(--muted); }
  .upload-link  { color: var(--orange); text-decoration: underline; cursor: pointer; }

  /* ── Grid layouts ─────────────────────────────────────────────────────── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }

  /* ── Card ─────────────────────────────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
  }
  .card-title { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
  .card-sub   { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* ── Route detail panel ───────────────────────────────────────────────── */
  .detail-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 420px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 200;
    transform: translateX(100%);
    transition: transform .2s ease;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .detail-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .panel-close {
    width: 28px; height: 28px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; font-size: 16px; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-left: 10px;
  }
  .panel-close:hover { color: var(--white); }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px; }

  .stop-timeline { display: flex; flex-direction: column; gap: 0; }
  .stop-item {
    display: flex; gap: 12px;
    position: relative; padding-bottom: 16px;
  }
  .stop-item:last-child { padding-bottom: 0; }
  .stop-item::before {
    content: '';
    position: absolute; left: 13px; top: 28px; bottom: 0;
    width: 1px; background: var(--border);
  }
  .stop-item:last-child::before { display: none; }
  .stop-dot {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; z-index: 1;
  }
  .stop-dot.done    { background: var(--green);  color: #fff; }
  .stop-dot.active  { background: var(--orange); color: #111; }
  .stop-dot.pending { background: var(--card2);  color: var(--muted); border: 1px solid var(--border); }
  .stop-content { flex: 1; }
  .stop-company { font-size: 13px; font-weight: 500; color: var(--white); margin-bottom: 2px; }
  .stop-address { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .stop-meta    { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── Map placeholder ──────────────────────────────────────────────────── */
  .map-box {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    height: 180px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; margin-bottom: 16px;
    position: relative; overflow: hidden;
  }
  .map-box::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent, transparent 20px,
      rgba(255,255,255,0.015) 20px, rgba(255,255,255,0.015) 21px
    );
  }
  .map-label { font-size: 12px; color: var(--muted); z-index: 1; }

  /* ── Progress bar ─────────────────────────────────────────────────────── */
  .prog-wrap { margin-bottom: 16px; }
  .prog-label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; color: var(--muted); }
  .prog-track { height: 5px; background: var(--card2); border-radius: 3px; overflow: hidden; }
  .prog-fill  { height: 100%; border-radius: 3px; background: var(--orange); }
  .prog-fill.green { background: var(--green); }

  /* ── Cost row ─────────────────────────────────────────────────────────── */
  .cost-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .cost-row:last-child { border: none; }
  .cost-label { color: var(--muted); }
  .cost-value { font-weight: 500; color: var(--white); }
  .cost-value.orange { color: var(--orange); }
  .cost-value.green  { color: var(--green); }

  /* ── CSV preview table ────────────────────────────────────────────────── */
  .csv-preview {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden; margin-bottom: 16px;
  }
  .csv-preview table { font-size: 11px; font-family: var(--font-mono); }
  .csv-preview thead th { background: var(--card); font-size: 10px; letter-spacing: .3px; }
  .csv-preview tbody td { padding: 8px 14px; color: var(--muted); }
  .csv-preview tbody tr:hover { background: rgba(255,255,255,0.03); }

  /* ── Metric mini ──────────────────────────────────────────────────────── */
  .metric-row {
    display: flex; gap: 10px; margin-bottom: 16px;
  }
  .metric {
    flex: 1; background: var(--card2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px;
    text-align: center;
  }
  .metric-val { font-size: 18px; font-weight: 600; color: var(--white); }
  .metric-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

  /* ── Alert banner ─────────────────────────────────────────────────────── */
  .alert {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 16px; border-radius: var(--radius);
    margin-bottom: 16px; font-size: 12px;
  }
  .alert-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
  .alert-body { flex: 1; line-height: 1.5; }
  .alert-title { font-weight: 600; margin-bottom: 2px; }
  .alert.warn { background: var(--yellow-dim); border: 1px solid rgba(241,196,15,.25); color: var(--yellow); }
  .alert.info { background: var(--blue-dim);   border: 1px solid var(--blue-bdr);     color: var(--blue); }
  .alert.ok   { background: var(--green-dim);  border: 1px solid var(--green-bdr);    color: var(--green); }

  /* ── Tabs ─────────────────────────────────────────────────────────────── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab {
    padding: 10px 18px; font-size: 13px; font-weight: 500;
    color: var(--muted); cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all .15s;
  }
  .tab:hover { color: var(--white); }
  .tab.active { color: var(--orange); border-bottom-color: var(--orange); }

  /* ── Empty state ──────────────────────────────────────────────────────── */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-title { font-size: 14px; font-weight: 500; color: var(--white); margin-bottom: 6px; }
  .empty-sub   { font-size: 12px; line-height: 1.6; }

  /* ── Overlay ──────────────────────────────────────────────────────────── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 150;
  }
  .overlay.show { display: block; }

  /* ── Scrollbar ────────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 3px; }

  /* ── Toast ────────────────────────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all .25s ease;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.info    { border-left: 3px solid var(--orange); }
</style>
</head>

const API_BASE = 'http://localhost:8000/api/v1';
let authToken = null;

async function apiLogin(email, password) {
  const body = new URLSearchParams({ username: email, password });
  const res = await fetch(`${API_BASE}/auth/token`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body,
  });
  if (!res.ok) throw new Error('Login fallido');
  const data = await res.json();
  authToken = data.access_token;
  return data;
}

async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`, {
    headers: { 'Authorization': `Bearer ${authToken}` },
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

async function apiPost(path, body) {
  const res = await fetch(`${API_BASE}${path}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${authToken}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const errText = await res.text().catch(() => '');
    throw new Error(`API error ${res.status}: ${errText}`);
  }
  return res.json();
}

// ── CSV parsing & import ─────────────────────────────────────────────────
let csvRouteType = 'mensajeria';
let parsedCsvRoutes = null;
let csvFileName = null;
let csvImportResult = null;

const CSV_TEMPLATES = {
  mensajeria: {
    header: 'fecha,hora_inicio,hora_fin,destino_1,ciudad_1,estado_1,contacto_1,paquetes,peso_lbs,volumen_ft3,fragil,pod_requerido,tipo_vehiculo,gross_pay',
    example: '2026-06-23,10:00,13:30,200 Park Ave,New York,NY,James R.,4,85,12,no,signature,furgoneta,87.50',
  },
  logistica: {
    header: 'fecha,hora_inicio,hora_fin,destino_1,ciudad_1,estado_1,contacto_1,paquetes,peso_lbs,volumen_ft3,fragil,muelle,pod_requerido,tipo_vehiculo,gross_pay',
    example: '2026-06-23,07:00,11:00,Bodega Sur,New York,NY,Encargado turno,12,310,46,no,Muelle 4,photo,furgon,180.00',
  },
  empleados: {
    header: 'fecha,hora_inicio,hora_fin,destino_1,ciudad_1,estado_1,contacto_1,pasajeros,pod_requerido,tipo_vehiculo,gross_pay',
    example: '2026-06-23,08:00,09:00,TechCorp HQ,New York,NY,3 empleados,3,signature,van,120.00',
  },
};

function downloadCsvTemplate(type) {
  const t = CSV_TEMPLATES[type] || CSV_TEMPLATES.mensajeria;
  const blob = new Blob([t.header + '\n' + t.example + '\n'], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `plantilla_muevo_${type}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function normalizeVehicleType(val) {
  if (!val) return null;
  const v = val.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); // quita tildes
  const map = { moto: 'moto', sedan: 'sedan', furgoneta: 'furgoneta', furgon: 'furgon', van: 'furgoneta', camion: 'furgon', truck: 'furgon' };
  return map[v] || null;
}

function parseCsvText(text, type) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
  const rows = lines.slice(1).map(line => {
    const cells = line.split(',').map(c => c.trim());
    const row = {};
    headers.forEach((h, i) => row[h] = cells[i] || '');
    return row;
  });

  // Cada fila del CSV = una ruta de 1 parada. Los campos varían según el tipo.
  return rows.map((row, idx) => {
    const date = row['fecha'] || new Date().toISOString().slice(0,10);
    const start = `${date}T${row['hora_inicio'] || '09:00'}:00`;
    const end   = `${date}T${row['hora_fin'] || row['hora_inicio'] || '10:00'}:00`;

    const stop = {
      address: row['destino_1'] || '',
      city: row['ciudad_1'] || '',
      state: row['estado_1'] || '',
      contact_name: row['contacto_1'] || '',
      pod_required: row['pod_requerido'] || 'signature',
    };

    if (type === 'empleados') {
      stop.passengers_count = parseInt(row['pasajeros']) || 0;
    } else {
      stop.packages_count = parseInt(row['paquetes']) || 0;
      stop.weight_lbs = parseFloat(row['peso_lbs']) || 0;
      stop.volume_ft3 = parseFloat(row['volumen_ft3']) || 0;
      stop.is_fragile = (row['fragil'] || '').toLowerCase().startsWith('s');
      if (type === 'logistica') {
        stop.dock_number = row['muelle'] && row['muelle'] !== '—' ? row['muelle'] : null;
      }
    }

    return {
      title: `Ruta ${row['destino_1'] || 'Importada'} #${idx+1}`,
      service_mode: type,
      scheduled_date: date,
      scheduled_start: start,
      scheduled_end: end,
      gross_pay: parseFloat(row['gross_pay']) || 50.00,
      required_vehicle_type: normalizeVehicleType(row['tipo_vehiculo']),
      stops: [stop],
    };
  });
}

function handleCsvFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  csvFileName = file.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      parsedCsvRoutes = parseCsvText(e.target.result, csvRouteType);
      if (parsedCsvRoutes.length === 0) {
        showToast('El archivo no tiene filas válidas', 'warn');
        return;
      }
      csvStep = 1;
      document.getElementById('content').innerHTML = renderUpload();
      showToast(`${parsedCsvRoutes.length} ruta(s) de ${csvRouteType} detectada(s)`, 'success');
    } catch (err) {
      showToast('Error al leer el CSV: ' + err.message, 'warn');
    }
  };
  reader.readAsText(file);
}

async function confirmCsvImport() {
  if (!useRealData) {
    showToast('Iniciá sesión con el backend real para importar rutas', 'warn');
    return;
  }
  if (!parsedCsvRoutes || parsedCsvRoutes.length === 0) return;

  try {
    showToast('Importando rutas...', 'info');
    csvImportResult = await apiPost('/warehouse/routes/bulk-import', { routes: parsedCsvRoutes });
    csvStep = 2;
    document.getElementById('content').innerHTML = renderUpload();
    showToast(`${csvImportResult.routes_created} ruta(s) importada(s) con éxito`, 'success');
    // Refrescar datos para que aparezcan en dashboard/rutas
    await loadRealData();
  } catch (err) {
    showToast('Error al importar: ' + err.message, 'warn');
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  const icons = { success:'✅', info:'ℹ️', warn:'⚠️' };
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Auth flow ────────────────────────────────────────────────────────────
async function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    await apiLogin(email, password);
    useRealData = true;
    await loadRealData();
    document.getElementById('loginOverlay').style.display = 'none';
    showView('dashboard');
    showToast('Conectado al backend real', 'success');
  } catch (e) {
    errEl.textContent = 'Email o contraseña incorrectos, o el backend no está corriendo.';
    errEl.style.display = 'block';
  }
}

function skipLogin() {
  useRealData = false;
  document.getElementById('loginOverlay').style.display = 'none';
  showView('dashboard');
}

let REAL_DASHBOARD = null;
let REAL_ROUTES = null;
let REAL_BILLING = null;

async function loadRealData() {
  try {
    REAL_DASHBOARD = await apiGet('/warehouse/dashboard');
    REAL_ROUTES = await apiGet('/warehouse/routes');
    REAL_BILLING = await apiGet('/warehouse/billing');
  } catch (e) {
    console.error('Error cargando datos reales:', e);
    useRealData = false;
  }
}

// Mapea una RouteHeader real (API) al shape que usa el resto del HTML/JS
function mapRealRoute(r) {
  return {
    id: r.id, num: r.route_number, title: r.title,
    client: r.company_name || 'Cliente corporativo',
    mode: r.service_mode === 'mensajeria' ? 'Mensajería' : r.service_mode === 'logistica' ? 'Logística' : 'Empleados',
    status: r.status === 'in_progress' ? 'in_progress' : r.status === 'completed' ? 'completed' : r.status === 'published' || r.status === 'assigned' ? 'scheduled' : r.status,
    date: r.scheduled_date ? new Date(r.scheduled_date).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) : '',
    time: r.scheduled_start && r.scheduled_end
      ? `${new Date(r.scheduled_start).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})} – ${new Date(r.scheduled_end).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}`
      : '',
    stops_total: r.total_stops || 0, stops_done: r.completed_stops || 0,
    km: r.total_km || 0,
    gross: r.gross_pay || 0, commission: (r.gross_pay||0) - (r.net_pay||0), net: r.net_pay || 0,
    transportista: r.transport_company_name || 'Sin asignar', transportista_rating: 4.8,
    vehicle: '', driver: '',
    shipment: r.total_packages > 0 ? {
      total_packages: r.total_packages, total_weight_lbs: r.total_weight_lbs,
      total_volume_ft3: r.total_volume_ft3, stackable: true,
      fragile: r.has_fragile_items, hazmat: r.has_hazmat_items, temp_controlled: r.requires_temp_control,
      cargo_value: r.total_cargo_value, insurance_required: r.requires_insurance,
      special_instructions: r.driver_notes || '',
    } : null,
    stops: (r.stops || []).map(s => ({
      order: s.sequence_order, company: s.company_name || '', address: s.address || '',
      eta: s.eta_scheduled ? new Date(s.eta_scheduled).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) : '',
      status: s.status, code: s.items?.[0]?.package_code || '', pod: s.pod_required,
      packages: s.packages_count, weight_lbs: s.weight_lbs, volume_ft3: s.volume_ft3,
      dock: s.dock_number || '', wait_min: s.wait_minutes_estimated || 0, notes: s.access_notes || '',
    })),
  };
}

function getActiveRoutes() {
  if (useRealData && REAL_ROUTES) return REAL_ROUTES.map(mapRealRoute);
  return ROUTES;
}
